name: Build and Release ZIGI

on:
  push:
    tags:
      - '*'  

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install xmi-reader

    - name: Generate XMIT
      run: python .github/scripts/generate_xmi.py

    - name: Upload XMIT artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZIGI.XMIT
        path: ZIGI.XMIT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        body_path: ZIGI.RELEASE
        files: ZIGI.XMIT