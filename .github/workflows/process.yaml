name: Build and Release ZIGI

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Compute next version
      id: version
      run: |
        # Get latest tag matching vXrY (e.g. v3r27)
        LATEST=$(git tag --list 'v*r*' --sort=-version:refname | head -n 1)
        if [ -z "$LATEST" ]; then
          NEXT="v3r28"
        else
          MAJOR=$(echo "$LATEST" | grep -oE 'v[0-9]+' | tr -d 'v')
          MINOR=$(echo "$LATEST" | grep -oE 'r[0-9]+' | tr -d 'r')
          NEXT="v${MAJOR}r$((MINOR + 1))"
        fi
        echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

    - name: Check version match
      id: check
      run: |
        RELEASE_VER=$(grep -m1 'Version [0-9]' ZIGI.RELEASE | grep -oE '[0-9]+\.[0-9]+')
        COMPUTED_VER=$(echo "${{ steps.version.outputs.tag }}" | sed 's/^v//' | sed 's/r/./')
        echo "ZIGI.RELEASE version : $RELEASE_VER"
        echo "Computed next version: $COMPUTED_VER"
        if [ "$RELEASE_VER" = "$COMPUTED_VER" ]; then
          echo "match=true" >> "$GITHUB_OUTPUT"
        else
          echo "match=false" >> "$GITHUB_OUTPUT"
          echo "Version mismatch — skipping release"
        fi

    - name: Create and push tag
      if: steps.check.outputs.match == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ steps.version.outputs.tag }}
        git push origin ${{ steps.version.outputs.tag }}

    - name: Set up Python
      if: steps.check.outputs.match == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      if: steps.check.outputs.match == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install xmi-reader

    - name: Generate XMIT
      if: steps.check.outputs.match == 'true'
      env:
        RELEASE_TAG: ${{ steps.version.outputs.tag }}
      run: python .github/scripts/generate_xmi.py

    - name: Upload XMIT artifact
      if: steps.check.outputs.match == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ZIGI.XMIT
        path: ZIGI.XMIT

    - name: Create Release
      if: steps.check.outputs.match == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ${{ steps.version.outputs.tag }}
        body_path: RELEASE.md
        files: ZIGI.XMIT