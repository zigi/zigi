name: Build and Release ZIGI

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  iefbr14:
    if: github.repository != 'zigi/zigi'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version from ZIGIVER
        id: version
        run: |
          ZIGIVER=$(grep -oE '[Vv][0-9]+[Rr][0-9]+' ZIGI.EXEC/ZIGIVER | head -1 | tr '[:upper:]' '[:lower:]')
          echo "tag=$ZIGIVER" >> "$GITHUB_OUTPUT"

      - name: IEFBR14
        run: |
          LATEST=$(git tag --list 'v*r*' --sort=-version:refname | head -n 1)
          ZIGIVER="${{ steps.version.outputs.tag }}"

          if [ "$ZIGIVER" != "$LATEST" ]; then
            FAIL=0
            STATUS="READY - ZIGIVER ($ZIGIVER) is ahead of latest tag ($LATEST)"
          else
            FAIL=1
            STATUS="NOT READY - ZIGIVER ($ZIGIVER) already released. Bump ZIGIVER before merging."
          fi

          # Log output (visible in step log)
          echo "//IEFBR14  JOB CLASS=A,MSGCLASS=X,NOTIFY=&SYSUID"
          echo "//*"
          echo "//* This workflow only executes on zigi/zigi."
          echo "//* On forks, we run IEFBR14 - the legendary z/OS do-nothing program."
          echo "//*"
          echo "//* Release check:"
          echo "//*   ZIGIVER version : $ZIGIVER"
          echo "//*   Latest tag      : $LATEST"
          echo "//*   $STATUS"
          echo "//*"
          echo "// EXEC PGM=IEFBR14"
          echo "//* Normal end of job. CC=0000."

          # Summary (visible on the run summary page)
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "//IEFBR14  JOB CLASS=A,MSGCLASS=X,NOTIFY=&SYSUID" >> "$GITHUB_STEP_SUMMARY"
          echo "//*   ZIGIVER version : $ZIGIVER" >> "$GITHUB_STEP_SUMMARY"
          echo "//*   Latest tag      : $LATEST" >> "$GITHUB_STEP_SUMMARY"
          echo "//*   $STATUS" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          exit $FAIL

  release:
    if: github.repository == 'zigi/zigi'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Read version from ZIGIVER
      id: version
      run: |
        ZIGIVER=$(grep -oE '[Vv][0-9]+[Rr][0-9]+' ZIGI.EXEC/ZIGIVER | head -1 | tr '[:upper:]' '[:lower:]')
        echo "tag=$ZIGIVER" >> "$GITHUB_OUTPUT"

    - name: Check version match
      id: check
      run: |
        LATEST=$(git tag --list 'v*r*' --sort=-version:refname | head -n 1)
        ZIGIVER="${{ steps.version.outputs.tag }}"
        echo "Latest tag  : $LATEST"
        echo "ZIGIVER says: $ZIGIVER"
        if [ "$ZIGIVER" != "$LATEST" ]; then
          echo "match=true" >> "$GITHUB_OUTPUT"
        else
          echo "match=false" >> "$GITHUB_OUTPUT"
          echo "ZIGIVER ($ZIGIVER) already tagged - skipping release"
        fi

    - name: Create and push tag
      if: steps.check.outputs.match == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ steps.version.outputs.tag }}
        git push origin ${{ steps.version.outputs.tag }}

    - name: Set up Python
      if: steps.check.outputs.match == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      if: steps.check.outputs.match == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install xmi-reader

    - name: Generate XMIT
      if: steps.check.outputs.match == 'true'
      env:
        RELEASE_TAG: ${{ steps.version.outputs.tag }}
      run: python .github/scripts/generate_xmi.py

    - name: Upload XMIT artifact
      if: steps.check.outputs.match == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ZIGI.XMIT
        path: ZIGI.XMIT

    - name: Create Release
      if: steps.check.outputs.match == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ${{ steps.version.outputs.tag }}
        body_path: RELEASE.md
        files: ZIGI.XMIT