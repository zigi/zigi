name: Build and Release ZIGI

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Compute next version
      id: version
      run: |
        # Get latest tag matching vMAJOR.MINOR (e.g. v1.0, v1.12)
        LATEST=$(git tag --list 'v*.*' --sort=-version:refname | head -n 1)
        if [ -z "$LATEST" ]; then
          NEXT="v1.0"
        else
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          NEXT="v${MAJOR}.$((MINOR + 1))"
        fi
        echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

    - name: Create and push tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ steps.version.outputs.tag }}
        git push origin ${{ steps.version.outputs.tag }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install xmi-reader

    - name: Generate XMIT
      env:
        RELEASE_TAG: ${{ steps.version.outputs.tag }}
      run: python .github/scripts/generate_xmi.py

    - name: Upload XMIT artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZIGI.XMIT
        path: ZIGI.XMIT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ${{ steps.version.outputs.tag }}
        body_path: RELEASE.md
        files: ZIGI.XMIT